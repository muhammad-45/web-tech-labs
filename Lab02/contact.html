<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f2f2;
}

.box{
    width:350px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

input, textarea{
    width:100%;
    padding:8px;
    margin-top:8px;
}

button{
    background:orange;
    border:none;
    padding:10px;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

#status{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}
header{
    text-align: center;
    color: black;
    font-weight: bold;
    background-color: orange;
    padding: 10px;
    font-size: large;
    font-family: Arial, Helvetica, sans-serif;
    text-decoration: none;
}

header a{
    margin: 15px;
    color: black;
    text-decoration: none;
}

header a:hover{
    text-decoration: underline;
}
</style>
</head>

<body>
    <header>
        <nav>
            <a href="index.html">Landing Page</a>
            <a href="profile.html">Profile (Task1)</a>
            <a href="schedule.html">Schedule (Task 2)</a>
            <a href="navigation.html">Navigation (Task 3)</a>
            <a href="registration.html">Registration (Task 4)</a>
            <a href="contact.html">Contact formspree (Task 4)</a>
        </nav>
    </header>

<div class="box">

<h2>Contact Us</h2>

<form id="contact-form"
action="https://formspree.io/f/xeeldenq"
method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" rows="5"
placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

<p id="status"></p>

</form>

</div>

<script>
const form = document.getElementById("contact-form");
const status = document.getElementById("status");

form.addEventListener("submit", async function(e){
e.preventDefault();

let data = new FormData(form);

let response = await fetch(form.action,{
method: form.method,
body: data,
headers:{ 'Accept':'application/json'}
});

if(response.ok){
status.innerHTML = "✅ Message sent successfully!";
form.reset();
}else{
status.innerHTML = "❌ Something went wrong. Try again.";
}
});
</script>

</body>
</html>
